version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: food_app_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: foodbooking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: food_app_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=foodbooking
      - DB_USER=admin
      - DB_PASSWORD=secretpassword

  frontend:
    build: ./frontend
    container_name: food_app_frontend
    ports:
      - "80:80"  # We map local port 8080 to container port 80
    depends_on:
      - backend

volumes:
  postgres_data: