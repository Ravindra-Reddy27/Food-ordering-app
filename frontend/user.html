<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container" style="padding-bottom: 80px;">
        <header class="dashboard-header">
            <h2>Select Your Items</h2>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </header>
        
        <div id="menuGrid" class="menu-grid"></div>
    </div>

    <div id="cartBar" class="cart-bar" style="display: none;">
        <span id="cartSummary">0 items selected</span>
        <button onclick="submitBulkOrder()" class="checkout-btn">Place Order</button>
    </div>

    <script>
        let selectedItems = new Set();

        window.onload = async () => {
            const res = await fetch('http://localhost:8000/items');
            const items = await res.json();
            const grid = document.getElementById('menuGrid');
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.id = `card-${item.id}`;
                
                card.onclick = () => toggleSelection(item.id);

                // encodeURIComponent fixes the broken image links by properly formatting the spaces in the item names
                // WITH THIS LINE:
                const imageUrl = `https://placehold.co/600x400/f1f5f9/64748b?text=${encodeURIComponent(item.item_name)}&font=Inter`;

                card.innerHTML = `
                    <img src="${imageUrl}" alt="${item.item_name}" class="item-img">
                    <div class="item-info">
                        <h3>${item.item_name}</h3>
                        <p class="desc">${item.description || 'A delicious treat.'}</p>
                        <p class="price">₹${item.price}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        };

        function toggleSelection(itemId) {
            const card = document.getElementById(`card-${itemId}`);
            
            if (selectedItems.has(itemId)) {
                selectedItems.delete(itemId);
                card.classList.remove('selected');
            } else {
                selectedItems.add(itemId);
                card.classList.add('selected');
            }
            updateCartUI();
        }

        function updateCartUI() {
            const cartBar = document.getElementById('cartBar');
            const summary = document.getElementById('cartSummary');
            
            if (selectedItems.size > 0) {
                cartBar.style.display = 'flex';
                summary.innerText = `${selectedItems.size} item(s) selected`;
            } else {
                cartBar.style.display = 'none';
            }
        }

        async function submitBulkOrder() {
            const userId = localStorage.getItem('user_id');
            if (!userId) {
                alert("Session expired. Please log in again.");
                window.location.href = 'index.html';
                return;
            }

            let successCount = 0;

            for (let itemId of selectedItems) {
                const payload = {
                    user_id: parseInt(userId),
                    item_id: parseInt(itemId)
                };

                const res = await fetch('http://localhost:8000/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) successCount++;
            }

            if (successCount === selectedItems.size) {
                alert(`Success! ${successCount} items have been ordered.`);
                selectedItems.clear();
                document.querySelectorAll('.menu-card.selected').forEach(card => {
                    card.classList.remove('selected');
                });
                updateCartUI();
            } else {
                alert("Some items failed to process. Check admin dashboard.");
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
