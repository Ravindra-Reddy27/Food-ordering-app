<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div>
                <h2>Completed Order History</h2>
                <a href="admin.html" style="font-size: 14px; text-decoration: underline;">&larr; Back to Active Orders</a>
            </div>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </header>
        
        <table border="1" cellpadding="10" style="width: 100%;">
            <thead>
                <tr>
                    <th>User</th>
                    <th>Items Ordered</th>
                    <th>Status & Billing</th>
                </tr>
            </thead>
            <tbody id="ordersTable"></tbody>
        </table>
    </div>

    <script>
        window.onload = async () => {
            // 1. Fetch menu items for pricing
            const itemsRes = await fetch('/api/items');
            const allItems = await itemsRes.json();
            const priceMap = {};
            allItems.forEach(item => {
                priceMap[item.item_name] = parseFloat(item.price || 12.99);
            });

            // 2. Fetch history orders
            const res = await fetch('/api/admin/orders?filter=history');
            const orders = await res.json();
            const tbody = document.getElementById('ordersTable');
            
            const groupedOrders = {};

            orders.forEach(order => {
                const utcDateString = order.order_date.endsWith('Z') ? order.order_date : order.order_date + 'Z';
                const dateObj = new Date(utcDateString);

                const formattedDate = dateObj.toLocaleString('en-IN', {
                    timeZone: 'Asia/Kolkata',
                    year: 'numeric', month: 'numeric', day: 'numeric',
                    hour: '2-digit', minute: '2-digit', hour12: true
                }).toUpperCase();

                const key = `${order.username}_${order.status}_${formattedDate}`;
                
                if (!groupedOrders[key]) {
                    groupedOrders[key] = {
                        username: order.username,
                        status: order.status,
                        date: formattedDate,
                        totalPrice: 0,
                        itemsList: {} 
                    };
                }
                
                const itemPrice = priceMap[order.item_name] || 12.99;
                groupedOrders[key].totalPrice += itemPrice;

                if (groupedOrders[key].itemsList[order.item_name]) {
                    groupedOrders[key].itemsList[order.item_name].qty += 1;
                } else {
                    groupedOrders[key].itemsList[order.item_name] = {
                        qty: 1, price: itemPrice
                    };  
                }
            });

            Object.values(groupedOrders).forEach(group => {
                let tr = document.createElement('tr');
                let itemsDisplay = Object.entries(group.itemsList)
                    .map(([itemName, data]) => `<strong>${data.qty}x</strong> ${itemName}`)
                    .join('<br><br>'); 

                const safeItems = encodeURIComponent(JSON.stringify(group.itemsList));

                tr.innerHTML = `
                    <td style="font-weight: bold; font-size: 16px;">${group.username}</td>
                    <td>${itemsDisplay}</td>
                    <td>
                        <span style="color: #10b981; font-weight: bold;">${group.status.toUpperCase()} &#10004;</span><br>
                        <span style="color: #64748b; font-size: 13px; margin-top: 5px; margin-bottom: 15px; display: inline-block;">${group.date}</span><br>
                        
                        <button onclick="printBill('${group.username}', '${group.date}', '${safeItems}', ${group.totalPrice}, false)" 
                                style="background-color: #3b82f6; width: auto; padding: 8px 12px; font-size: 12px; border-radius: 6px; box-shadow: none;">
                            <i class="fa-solid fa-file-invoice"></i> Print Bill
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        };

        // --- IDENTICAL PRINT FUNCTION ---
        function printBill(username, date, safeItems, grandTotal, isPending) {
            const itemsList = JSON.parse(decodeURIComponent(safeItems));
            let itemsHTML = '';
            let totalItems = 0;
            
            for (const [itemName, data] of Object.entries(itemsList)) {
                const lineTotal = data.qty * data.price;
                itemsHTML += `
                    <tr>
                        <td style="padding: 12px 5px; border-bottom: 1px solid #eee;">${itemName}</td>
                        <td style="padding: 12px 5px; border-bottom: 1px solid #eee; text-align: center;">${data.qty}</td>
                        <td style="padding: 12px 5px; border-bottom: 1px solid #eee; text-align: right;">₹${data.price.toFixed(2)}</td>
                        <td style="padding: 12px 5px; border-bottom: 1px solid #eee; text-align: right; font-weight: bold;">₹${lineTotal.toFixed(2)}</td>
                    </tr>
                `;
                totalItems += data.qty;
            }

            const statusHtml = isPending 
                ? `<span style="color: #f39c12;">Pending / Unpaid</span>`
                : `<span style="color: #10b981;">Paid & Completed</span>`;

            const printWindow = window.open('', '_blank', 'width=600,height=800');
            printWindow.document.write(`
                <html>
                <head>
                    <title>Receipt - ${username}</title>
                    <style>
                        body { font-family: 'Arial', sans-serif; color: #333; padding: 40px; }
                        .receipt-box { max-width: 450px; margin: auto; border: 1px solid #ddd; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
                        h2 { text-align: center; margin-bottom: 5px; color: #10b981; }
                        .restaurant-name { text-align: center; font-size: 12px; color: #888; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
                        .details { margin-bottom: 25px; font-size: 14px; line-height: 1.6; }
                        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
                        th { background-color: #f8fafc; padding: 10px 5px; text-align: left; border-bottom: 2px solid #ddd; color: #475569; }
                        .totals-box { border-top: 2px solid #333; padding-top: 15px; margin-top: 15px; }
                        .flex-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
                        .grand-total { font-size: 18px; font-weight: bold; color: #10b981; margin-top: 10px; }
                        .thank-you { text-align: center; font-size: 12px; color: #888; margin-top: 35px; }
                    </style>
                </head>
                <body>
                    <div class="receipt-box">
                        <h2>Order Receipt</h2>
                        <div class="restaurant-name">Food Booking App</div>
                        <div class="details">
                            <strong>Customer:</strong> ${username}<br>
                            <strong>Date:</strong> ${date}<br>
                            <strong>Status:</strong> ${statusHtml}
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Item</th>
                                    <th style="text-align: center;">Qty</th>
                                    <th style="text-align: right;">Price</th>
                                    <th style="text-align: right;">Total</th>
                                </tr>
                            </thead>
                            <tbody>${itemsHTML}</tbody>
                        </table>
                        <div class="totals-box">
                            <div class="flex-row">
                                <span>Total Items:</span>
                                <span>${totalItems}</span>
                            </div>
                            <div class="flex-row grand-total">
                                <span>Grand Total:</span>
                                <span>₹${grandTotal.toFixed(2)}</span>
                            </div>
                        </div>
                        <div class="thank-you">Thank you for your order!</div>
                    </div>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.focus();
            setTimeout(() => { printWindow.print(); }, 250);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
