<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Login</h2>
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required><br><br>
        <input type="password" id="password" placeholder="Password" required><br><br>
        
        <select id="roleSelect" required>
            <option value="user">Login as User</option>
            <option value="admin">Login as Admin</option>
        </select><br><br>

        <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="signup.html">Sign up here</a></p>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // Get the values from the inputs
            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };
            const selectedRole = document.getElementById('roleSelect').value;

            // Call our FastAPI backend
            const res = await fetch('http://localhost:8000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                const data = await res.json();
                
                // NEW LOGIC: Verify the selected role matches the database role
                if (data.role !== selectedRole) {
                    alert(`Access Denied: You selected ${selectedRole.toUpperCase()}, but this account is registered as a ${data.role.toUpperCase()}.`);
                    return; // Stop the login process
                }

                // If roles match, save the user_id and redirect
                localStorage.setItem('user_id', data.user_id); 
                
                if (data.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'user.html';
                }
            } else {
                alert('Invalid credentials!');
            }
        };
    </script>
</body>
</html>
