<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Menu</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dashboard-body">
    <div class="dashboard-container">
        
        <header class="dashboard-header" id="mainHeader">
            <h2>Select Your Items</h2>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </header>

        <div id="menuSection">
            <div class="menu-grid" id="menuGrid">
                </div>
        </div>

        <div id="successSection" class="success-wrapper" style="display: none;">
            <div class="success-card">
                <i class="fa-solid fa-circle-check success-icon-large"></i>
                <h2>Order Placed!</h2>
                <p class="success-subtext">The kitchen has received your order.</p>

                <div class="receipt-box">
                    <h3>Order Summary</h3>
                    <ul id="receiptItems" class="clean-list">
                        </ul>
                    <div class="receipt-total-row">
                        <span>Total Paid:</span>
                        <span id="receiptTotal">₹0.00</span>
                    </div>
                </div>

                <div class="action-buttons">
                    <button onclick="resetMenu()" class="btn-outline">Order More</button>
                    <button onclick="logout()" class="btn-solid">Logout</button>
                </div>
            </div>
        </div>

    </div>

    <div class="cart-bar" id="cartBar">
        <div id="cartSummary">0 item(s) selected</div>
        <button onclick="placeOrder()" class="checkout-btn" id="checkoutBtn" disabled>Place Order</button>
    </div>

    <script>
        let allItems = [];
        let selectedItems = new Set();
        const userId = localStorage.getItem('user_id');

        if (!userId) window.location.href = 'index.html';

        window.onload = async () => {
            const res = await fetch('/api/items');
            allItems = await res.json();
            renderMenu();
        };

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';

            allItems.forEach(item => {
                const isSelected = selectedItems.has(item.id);
                
                const card = document.createElement('div');
                card.className = `menu-card ${isSelected ? 'selected' : ''}`;
                card.onclick = () => toggleItem(item.id);

                card.innerHTML = `
                    <div class="item-img" style="display:flex; align-items:center; justify-content:center; background:#f1f5f9;">
                        <h3 style="color:#64748b; opacity:0.7;">${item.item_name}</h3>
                    </div>
                    <div class="item-info">
                        <h3>${item.item_name}</h3>
                        <p class="desc">Delicious freshly prepared ${item.item_name.toLowerCase()}.</p>
                        <p class="price">₹${item.price || '12.99'}</p> 
                    </div>
                `;
                grid.appendChild(card);
            });
            updateCartBar();
        }

        function toggleItem(itemId) {
            if (selectedItems.has(itemId)) {
                selectedItems.delete(itemId);
            } else {
                selectedItems.add(itemId);
            }
            renderMenu();
        }

        function updateCartBar() {
            const count = selectedItems.size;
            document.getElementById('cartSummary').innerText = `${count} item(s) selected`;
            
            const btn = document.getElementById('checkoutBtn');
            if (count > 0) {
                btn.removeAttribute('disabled');
                btn.style.opacity = '1';
                btn.style.cursor = 'pointer';
            } else {
                btn.setAttribute('disabled', 'true');
                btn.style.opacity = '0.5';
                btn.style.cursor = 'not-allowed';
            }
        }

        async function placeOrder() {
            if (selectedItems.size === 0) return;

            let orderHtml = '';
            let total = 0;
            
            for (let itemId of selectedItems) {
                const itemData = allItems.find(i => i.id === itemId);
                const price = parseFloat(itemData.price || 12.99); 
                total += price;
                
                orderHtml += `
                    <li>
                        <span>1x ${itemData.item_name}</span>
                        <span>₹${price.toFixed(2)}</span>
                    </li>
                `;

                await fetch('/api/order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: parseInt(userId), item_id: itemId })
                });
            }

            document.getElementById('receiptItems').innerHTML = orderHtml;
            document.getElementById('receiptTotal').innerText = `₹${total.toFixed(2)}`;

            document.getElementById('menuSection').style.display = 'none';
            document.getElementById('cartBar').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'none'; 
            
            document.getElementById('successSection').style.display = 'flex'; 
            
            selectedItems.clear();
            renderMenu();
        }

        function resetMenu() {
            document.getElementById('successSection').style.display = 'none';
            document.getElementById('menuSection').style.display = 'block';
            document.getElementById('cartBar').style.display = 'flex';
            document.getElementById('mainHeader').style.display = 'flex'; 
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
